<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naraparaju — Crossword Builder</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --accent: #f0a500;
      --accent2: #e05c2a;
      --accent3: #7c5cfc;
      --text: #f0ede8;
      --text2: #9b9795;
      --text3: #5c5a57;
      --success: #2ecc71;
      --danger: #e74c3c;
      --cell: 44px;
      --gap: 3px;
      --radius: 8px;
      --radius-lg: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
    }

    .particles-svg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      width: 100%;
      height: 100%;
    }

    /* ── Layout ── */
    .wrap {
      position: relative;
      z-index: 2;
      max-width: 1300px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.8s ease both;
    }

    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 5.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0a500 0%, #e05c2a 40%, #f0a500 80%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 8s linear infinite, fadeDown 0.8s ease both;
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    .site-sub {
      font-size: 0.95rem;
      color: var(--text2);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .header-divider {
      margin: 1.1rem auto 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: expandLine 1s ease 0.3s both;
    }

    @keyframes expandLine {
      from {
        width: 0;
        opacity: 0;
      }

      to {
        width: 60px;
        opacity: 1;
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.4rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.6s ease both;
    }

    .card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .card:nth-child(3) {
      animation-delay: 0.2s;
    }

    .card-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    /* ── Inputs ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      height: 40px;
      padding: 0 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--text3);
    }

    #wordInput {
      flex: 0 0 140px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #clueInput {
      flex: 1;
      min-width: 160px;
    }

    .btn {
      height: 40px;
      padding: 0 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 500;
    }

    .btn-accent:hover {
      background: #fbb82a;
      border-color: #fbb82a;
      color: #000;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      height: 42px;
      padding: 0 24px;
    }

    .btn-primary:hover {
      filter: brightness(1.12);
    }

    .btn-primary:disabled {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text3);
      cursor: not-allowed;
      filter: none;
    }

    .btn-ghost {
      font-size: 0.8rem;
      height: 32px;
      padding: 0 12px;
    }

    .btn-danger {
      border-color: rgba(231, 76, 60, 0.4);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(231, 76, 60, 0.1);
      border-color: var(--danger);
    }

    /* ── Word list ── */
    .word-list {
      display: flex;
      flex-direction: column !important;
      gap: 6px;
    }

    .word-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .word-badge {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 500;
      color: #000;
      flex-shrink: 0;
    }

    .word-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      min-width: 110px;
      letter-spacing: 0.06em;
    }

    .word-clue {
      font-size: 0.8rem;
      color: var(--text2);
      flex: 1;
    }

    .word-del {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .word-del:hover {
      color: var(--danger);
      background: rgba(231, 76, 60, 0.1);
    }

    /* ── Status ── */
    .status-msg {
      font-size: 0.78rem;
      padding: 7px 12px;
      border-radius: var(--radius);
      margin-top: 8px;
    }

    .status-ok {
      background: rgba(46, 204, 113, 0.12);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .status-err {
      background: rgba(231, 76, 60, 0.12);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.2);
    }

    /* ── Grid section ── */
    .grid-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .size-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
    }

    .size-chip strong {
      color: var(--accent);
    }

    /* ── Side-by-side layout: grid left, clues right ── */
    .crossword-layout {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 860px) {
      .crossword-layout {
        grid-template-columns: 1fr;
      }
    }

    /* ── Grid ── */
    .grid-scroll {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .cw-grid {
      display: inline-grid;
      gap: var(--gap);
      padding: 6px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .cw-cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 5px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      transition: background 0.15s, transform 0.1s;
      cursor: default;
      user-select: none;
    }

    .cw-cell.black {
      background: var(--bg);
    }

    .cw-cell.light {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: transparent;
    }

    .cw-cell.light:hover {
      border-color: var(--border2);
      cursor: pointer;
    }

    .cw-cell.highlight {
      background: rgba(240, 165, 0, 0.12);
      border: 1px solid var(--accent) !important;
      color: transparent;
    }

    .cw-cell.revealed-cell {
      background: rgba(240, 165, 0, 0.18);
      border: 1px solid var(--accent) !important;
      color: var(--accent);
      animation: popIn 0.32s ease;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.5);
      }

      65% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .cell-num {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 0.52rem;
      color: var(--accent);
      font-weight: 500;
      line-height: 1;
    }

    .cell-letter {
      position: absolute;
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* ── Clues panel (side) ── */
    .clues-panel {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .clue-group-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .clue-row {
      display: flex;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
      align-items: baseline;
    }

    .clue-row:hover {
      background: var(--surface2);
    }

    .clue-row.active-clue {
      background: rgba(240, 165, 0, 0.1);
      border-left: 2px solid var(--accent);
      padding-left: 8px;
    }

    .clue-row.done-clue {
      opacity: 0.42;
    }

    .clue-n {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 22px;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
    }

    .clue-t {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── Sequential reveal controls ── */
    .reveal-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 1.25rem;
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .next-clue-label {
      font-size: 0.8rem;
      color: var(--text3);
      flex-shrink: 0;
    }

    .next-clue-preview {
      font-size: 0.85rem;
      color: var(--text2);
      flex: 1;
      font-style: italic;
    }

    .next-clue-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
      margin-right: 6px;
    }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-size: 0.9rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    /* ── Persistence badge ── */
    .persist-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .persist-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <canvas id="bgCanvas"></canvas>
  <svg class="particles-svg" id="particles"></svg>

  <div class="wrap">
    <!-- Header -->
    <header class="site-header">
      <h1 class="site-name">Naraparaju</h1>
      <p class="site-sub">Crossword Builder &nbsp;·&nbsp; शब्द पहेली</p>
      <div style="margin-top:12px; display:flex; justify-content:center; gap:10px;">
        <button class="btn btn-ghost" style="height:30px; font-size:0.75rem; border-color:var(--accent); color:var(--accent);" onclick="copyShareLink()">
          <span id="shareBtnLabel">🔗 Share / Sync across devices</span>
        </button>
      </div>
      <div class="header-divider"></div>
    </header>

    <!-- Input card -->
    <div class="card">
      <div class="card-label" style="display:flex;align-items:center;justify-content:space-between;">
        <span>Add words &amp; clues</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-ghost btn-danger" style="height:24px;padding:0 8px;font-size:0.7rem;" onclick="clearAllWords()">Clear all</button>
          <span class="persist-badge"><span class="persist-dot"></span>Auto-saved</span>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="wordInput" placeholder="WORD" maxlength="20" autocomplete="off" autocorrect="off"
          spellcheck="false" />
        <input type="text" id="clueInput" placeholder="Enter your clue here…" autocomplete="off" />
        <button class="btn btn-accent" onclick="addWord()">Add</button>
      </div>
      <div id="wordList" class="word-list"></div>
      <div id="statusMsg"></div>
    </div>

    <!-- Grid card -->
    <div class="card">
      <div class="card-label">Crossword grid</div>
      <div class="grid-top">
        <div class="size-chip" id="sizeBadge">Grid: <strong>—</strong></div>
        <button class="btn btn-primary" id="genBtn" onclick="generateCrossword()" disabled>Generate</button>
        <button class="btn btn-ghost btn-danger" id="revealAllBtn" onclick="revealAll()" style="display:none">Reveal
          all</button>
        <button class="btn btn-ghost" onclick="clearProgress()" id="clearBtn" style="display:none">Reset
          progress</button>
      </div>

      <!-- Side-by-side: grid + clues -->
      <div class="crossword-layout" id="crosswordLayout">
        <div class="grid-scroll">
          <div id="gridWrapper">
            <div class="empty">
              <div class="empty-icon">◻</div>
              Add at least 2 words then click Generate
            </div>
          </div>
        </div>
        <div class="clues-panel" id="cluesPanel" style="display:none">
          <div>
            <div class="clue-group-title">Across →</div>
            <div id="acrossClues"></div>
          </div>
          <div>
            <div class="clue-group-title">Down ↓</div>
            <div id="downClues"></div>
          </div>
        </div>
      </div>

      <!-- Sequential reveal -->
      <div class="reveal-controls" id="revealControls" style="display:none">
        <span class="next-clue-label">Next reveal:</span>
        <span id="nextClueInfo" class="next-clue-preview">—</span>
        <button class="btn btn-primary" style="height:36px;padding:0 20px;" id="revealNextBtn"
          onclick="revealNext()">Reveal next ↵</button>
      </div>
    <!-- Batch Import card -->
    <div class="card">
      <div class="card-label">Batch Import (JSON)</div>
      <div style="margin-bottom: 1rem;">
        <textarea id="batchInput" placeholder='{
  "Clue": ["WORD1", "WORD2"],
  "Clue2": "WORD3"
}' style="width: 100%; height: 120px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: &#39;DM Mono&#39;, monospace; font-size: 0.85rem; padding: 12px; outline: none; transition: border-color 0.2s; resize: vertical;"></textarea>
      </div>
      <button class="btn btn-accent" onclick="batchImport()">Import Batch</button>
    </div>
  </div>

  <script>
    /* ══════════ BACKGROUND — very slow blobs ══════════ */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, t = 0;
      // sp values are ~5x smaller → 5x slower movement
      const blobs = [
        { x: 0.2, y: 0.3, r: 0.38, c: 'rgba(240,165,0,', sp: 0.00008 },
        { x: 0.8, y: 0.7, r: 0.32, c: 'rgba(224,92,42,', sp: 0.00010 },
        { x: 0.5, y: 0.5, r: 0.30, c: 'rgba(124,92,252,', sp: 0.00006 },
        { x: 0.1, y: 0.8, r: 0.22, c: 'rgba(240,165,0,', sp: 0.00012 },
        { x: 0.9, y: 0.2, r: 0.24, c: 'rgba(224,92,42,', sp: 0.00009 },
      ];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 1;
        blobs.forEach((b, i) => {
          const ox = Math.sin(t * b.sp * 1000 + i * 1.3) * 0.10;
          const oy = Math.cos(t * b.sp * 1000 + i * 0.9) * 0.08;
          const cx = (b.x + ox) * W, cy = (b.y + oy) * H;
          const r = b.r * Math.min(W, H);
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0, b.c + '0.11)');
          g.addColorStop(0.5, b.c + '0.04)');
          g.addColorStop(1, b.c + '0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      resize(); draw();
    })();

    /* ══════════ PARTICLES — slow & sparse ══════════ */
    (function () {
      const svg = document.getElementById('particles');
      const dots = [];
      for (let i = 0; i < 18; i++) {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('r', 1 + Math.random() * 1.5);
        c.setAttribute('fill', ['rgba(240,165,0,0.3)', 'rgba(224,92,42,0.2)', 'rgba(124,92,252,0.2)'][i % 3]);
        const x = Math.random() * 100, y = Math.random() * 100;
        c.setAttribute('cx', x + '%'); c.setAttribute('cy', y + '%');
        svg.appendChild(c);
        dots.push({ el: c, x, y, vx: (Math.random() - 0.5) * 0.006, vy: -0.004 - Math.random() * 0.005 });
      }
      function tick() {
        dots.forEach(d => {
          d.x += d.vx; d.y += d.vy;
          if (d.y < -2) { d.y = 102; d.x = Math.random() * 100; }
          if (d.x < -2) d.x = 102; if (d.x > 102) d.x = -2;
          d.el.setAttribute('cx', d.x + '%'); d.el.setAttribute('cy', d.y + '%');
        });
        requestAnimationFrame(tick);
      }
      tick();
    })();

    /* ══════════ AUDIO ══════════ */
    let aCtx = null;
    function ac() { if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)(); return aCtx; }
    function tone(f, dur, type = 'sine', vol = 0.15) {
      try { const c = ac(), o = c.createOscillator(), g = c.createGain(); o.connect(g); g.connect(c.destination); o.type = type; o.frequency.value = f; g.gain.setValueAtTime(vol, c.currentTime); g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur); o.start(); o.stop(c.currentTime + dur); } catch (e) { }
    }
    function sndAdd() { tone(660, 0.1); setTimeout(() => tone(880, 0.09), 75); }
    function sndGen() { [440, 554, 660, 784, 880].forEach((f, i) => setTimeout(() => tone(f, 0.12), i * 55)); }
    function sndReveal() { tone(523, 0.07); setTimeout(() => tone(659, 0.07), 65); setTimeout(() => tone(784, 0.11), 130); }
    function sndErr() { tone(200, 0.2, 'sawtooth', 0.08); }

    /* ══════════ STATE ══════════ */
    let words = [];
    let placed = null;  // { placed:[], grid:[] }
    let selectedClue = null;
    let revealedKeys = new Set(); // "word:dir:r:c" keys of revealed words
    let revealQueue = [];        // ordered list of all placed entries by number
    let revealIndex = 0;         // pointer into revealQueue

    const LS_WORDS = 'nara_words';
    const LS_PLACED = 'nara_placed';
    const LS_REVEALED = 'nara_revealed';
    const LS_RIDX = 'nara_ridx';

    /* ══════════ LOCALSTORAGE ══════════ */
    function saveToLS() {
      try {
        localStorage.setItem(LS_WORDS, JSON.stringify(words));
        if (placed) {
          localStorage.setItem(LS_PLACED, JSON.stringify({ placed: placed.placed, grid: placed.grid }));
        }
        localStorage.setItem(LS_REVEALED, JSON.stringify([...revealedKeys]));
        localStorage.setItem(LS_RIDX, JSON.stringify(revealIndex));
      } catch (e) { }
    }

    function loadFromLS() {
      try {
        const w = localStorage.getItem(LS_WORDS);
        if (w) words = JSON.parse(w);

        const p = localStorage.getItem(LS_PLACED);
        if (p) {
          const data = JSON.parse(p);
          placed = data;
          window._grid = data.grid;
          window._size = data.grid.length;
          buildNumberMap(data.placed, data.grid);
          buildRevealQueue(data.placed);
        }

        const rv = localStorage.getItem(LS_REVEALED);
        if (rv) revealedKeys = new Set(JSON.parse(rv));

        const ri = localStorage.getItem(LS_RIDX);
        if (ri) revealIndex = JSON.parse(ri);
      } catch (e) { }
    }

    /* ══════════ URL SYNC (NO DATABASE) ══════════ */
    function pack(obj) {
      return window.btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
    }
    function unpack(str) {
      try { return JSON.parse(decodeURIComponent(escape(window.atob(str)))); } catch (e) { return null; }
    }

    function checkURLSync() {
      const hash = window.location.hash;
      if (hash.startsWith('#data=')) {
        const encoded = hash.substring(6);
        const decoded = unpack(encoded);
        if (decoded && Array.isArray(decoded)) {
          if (confirm(`Sync data from link? This will add ${decoded.length} words to your list.`)) {
            // Merge or Replace? Let's replace if list is empty, otherwise merge
            if (words.length === 0) {
              words = decoded;
            } else {
              decoded.forEach(wObj => {
                if (!words.some(x => x.word === wObj.word)) words.push(wObj);
              });
            }
            renderWordList();
            updateSizeBadge();
            saveToLS();
            window.location.hash = ''; // Clear hash after import
            showMsg('Synced successfully!', true);
          }
        }
      }
    }

    function copyShareLink() {
      if (words.length === 0) {
        showMsg('Add some words first!', false);
        return;
      }
      const data = pack(words);
      const url = window.location.origin + window.location.pathname + '#data=' + data;
      
      navigator.clipboard.writeText(url).then(() => {
        const lbl = document.getElementById('shareBtnLabel');
        const old = lbl.textContent;
        lbl.textContent = '✅ Link copied to clipboard!';
        setTimeout(() => lbl.textContent = old, 3000);
        showMsg('Shareable link copied!', true);
      }).catch(() => {
        alert('Failed to copy. Please copy from URL bar: ' + url);
      });
    }

    /* ══════════ INIT ══════════ */
    window.addEventListener('DOMContentLoaded', () => {
      loadFromLS();
      checkURLSync(); // Check for shared data before rendering
      renderWordList();
      updateSizeBadge();
      document.getElementById('genBtn').disabled = words.length < 2;

      if (placed) {
        renderGrid(placed.grid, placed.grid.length);
        renderClues(placed.placed);
        document.getElementById('cluesPanel').style.display = '';
        document.getElementById('revealAllBtn').style.display = '';
        document.getElementById('clearBtn').style.display = '';
        document.getElementById('revealControls').style.display = 'flex';
        // Re-apply revealed cells
        revealedKeys.forEach(key => {
          const entry = revealQueue.find(e => entryKey(e) === key);
          if (entry) applyRevealToCells(entry.word, entry.r, entry.c, entry.dir, false);
        });
        updateRevealControls();
        updateClueDoneStates();
      }
    });

    /* ══════════ WORDS ══════════ */
    function addWord() {
      const wEl = document.getElementById('wordInput'), cEl = document.getElementById('clueInput');
      const w = wEl.value.trim().toUpperCase().replace(/[^A-Z]/g, ''), c = cEl.value.trim();
      if (w.length < 2) { showMsg('Word must be at least 2 letters.', false); sndErr(); return; }
      if (!c) { showMsg('Please enter a clue.', false); sndErr(); return; }
      if (words.some(x => x.word === w)) { showMsg(`"${w}" is already in the list.`, false); sndErr(); return; }
      words.push({ word: w, clue: c });
      wEl.value = ''; cEl.value = ''; wEl.focus();
      renderWordList(); updateSizeBadge();
      document.getElementById('genBtn').disabled = words.length < 2;
      sndAdd(); showMsg(`"${w}" added!`, true);
      saveToLS();
    }

    function showMsg(txt, ok) {
      const el = document.getElementById('statusMsg');
      el.className = 'status-msg ' + (ok ? 'status-ok' : 'status-err'); el.textContent = txt;
      clearTimeout(el._t); el._t = setTimeout(() => el.innerHTML = '', 2600);
    }

    function deleteWord(i) {
      words.splice(i, 1); renderWordList(); updateSizeBadge();
      document.getElementById('genBtn').disabled = words.length < 2;
      resetGrid(); saveToLS();
    }

    function renderWordList() {
      // Ensure words are rendered in the exact order they were added
      document.getElementById('wordList').innerHTML = words.map((w, i) => `
    <div class="word-item">
      <div class="word-badge">${i + 1}</div>
      <div class="word-text">${w.word}</div>
      <div class="word-clue">${w.clue}</div>
      <button class="word-del" onclick="deleteWord(${i})" title="Remove">✕</button>
    </div>`).join('');
    }

    /* ══════════ BATCH IMPORT ══════════ */
    function batchImport() {
      const bEl = document.getElementById('batchInput');
      const input = bEl.value.trim();
      if (!input) return;
      try {
        const data = JSON.parse(input);
        let count = 0;
        // Iterate through entries to preserve JSON order
        for (const [clue, val] of Object.entries(data)) {
          const wordsToAdd = Array.isArray(val) ? val : [val];
          wordsToAdd.forEach(wRaw => {
            const w = wRaw.toString().trim().toUpperCase().replace(/[^A-Z]/g, '');
            if (w.length >= 2 && !words.some(x => x.word === w)) {
              words.push({ word: w, clue: clue.trim() });
              count++;
            }
          });
        }
        if (count > 0) {
          renderWordList();
          updateSizeBadge();
          document.getElementById('genBtn').disabled = words.length < 2;
          bEl.value = '';
          showMsg(`Successfully imported ${count} words!`, true);
          saveToLS();
          sndAdd();
        } else {
          showMsg('No new valid words found in JSON.', false);
        }
      } catch (e) {
        showMsg('Error: Invalid JSON format.', false);
        sndErr();
      }
    }

    /* ══════════ SIZE ══════════ */
    function autoSize() {
      if (!words.length) return null;
      const maxL = Math.max(...words.map(w => w.word.length)), n = words.length;
      // More generous sizing for larger lists to ensure they all fit
      if (n <= 5) return Math.max(maxL + 3, 10);
      if (n <= 10) return Math.max(maxL + 5, 15);
      if (n <= 15) return Math.max(maxL + 7, 20);
      return Math.max(maxL + 10, 25);
    }
    function updateSizeBadge() {
      const s = autoSize();
      document.getElementById('sizeBadge').innerHTML = s ? `Grid: <strong>${s} × ${s}</strong>` : `Grid: <strong>—</strong>`;
    }
    function resetGrid() {
      placed = null; revealedKeys = new Set(); revealQueue = []; revealIndex = 0;
      localStorage.removeItem(LS_PLACED); localStorage.removeItem(LS_REVEALED); localStorage.removeItem(LS_RIDX);
      document.getElementById('gridWrapper').innerHTML = '<div class="empty"><div class="empty-icon">◻</div>Add at least 2 words then click Generate</div>';
      document.getElementById('cluesPanel').style.display = 'none';
      document.getElementById('revealAllBtn').style.display = 'none';
      document.getElementById('clearBtn').style.display = 'none';
      document.getElementById('revealControls').style.display = 'none';
    }

    /* ══════════ PLACEMENT ══════════ */
    function placeCrossword(wordList, size) {
      const sorted = [...wordList].sort((a, b) => b.length - a.length);
      const pl = [], g = Array.from({ length: size }, () => Array(size).fill(null));

      function canPlace(word, r, c, dir) {
        if (dir === 'across') {
          if (c < 0 || c + word.length > size) return false;
          if (c > 0 && g[r][c - 1] !== null) return false;
          if (c + word.length < size && g[r][c + word.length] !== null) return false;
          let inter = false;
          for (let i = 0; i < word.length; i++) {
            const cell = g[r][c + i];
            if (cell !== null && cell !== word[i]) return false;
            if (cell === word[i]) inter = true;
            if (cell === null) { if (r > 0 && g[r - 1][c + i] !== null) return false; if (r < size - 1 && g[r + 1][c + i] !== null) return false; }
          }
          return pl.length === 0 || inter;
        } else {
          if (r < 0 || r + word.length > size) return false;
          if (r > 0 && g[r - 1][c] !== null) return false;
          if (r + word.length < size && g[r + word.length][c] !== null) return false;
          let inter = false;
          for (let i = 0; i < word.length; i++) {
            const cell = g[r + i][c];
            if (cell !== null && cell !== word[i]) return false;
            if (cell === word[i]) inter = true;
            if (cell === null) { if (c > 0 && g[r + i][c - 1] !== null) return false; if (c < size - 1 && g[r + i][c + 1] !== null) return false; }
          }
          return pl.length === 0 || inter;
        }
      }

      function placeW(word, r, c, dir) {
        for (let i = 0; i < word.length; i++) { if (dir === 'across') g[r][c + i] = word[i]; else g[r + i][c] = word[i]; }
        pl.push({ word, r, c, dir });
      }

      for (const word of sorted) {
        if (pl.length === 0) { placeW(word, Math.floor(size / 2), Math.floor((size - word.length) / 2), 'across'); continue; }
        let best = null;
        for (const pw of pl) {
          for (let pi = 0; pi < pw.word.length; pi++) {
            for (let wi = 0; wi < word.length; wi++) {
              if (pw.word[pi] !== word[wi]) continue;
              for (const dir of ['across', 'down']) {
                if (dir === pw.dir) continue;
                let r, c;
                if (dir === 'across') { r = pw.r + (pw.dir === 'down' ? pi : 0); c = pw.c + (pw.dir === 'across' ? pi : 0) - wi; }
                else { r = pw.r + (pw.dir === 'across' ? 0 : pi) - wi; c = pw.c + (pw.dir === 'down' ? 0 : pi); }
                if (canPlace(word, r, c, dir)) { const score = wi + pi; if (!best || score > best.score) best = { r, c, dir, score }; }
              }
            }
          }
        }
        if (best) placeW(word, best.r, best.c, best.dir);
      }
      return { placed: pl, grid: g };
    }

    /* ══════════ NUMBER MAP — follows input order ══════════ */
    function buildNumberMap(pl, g) {
      const nm = {};
      // We want the numbers to follow the order in the 'words' array
      words.forEach((wObj, idx) => {
        // Find where this word was placed
        const p = pl.find(x => x.word === wObj.word);
        if (p) {
          const key = `${p.r},${p.c}`;
          if (!nm[key]) {
            // Assign a sequential number based on how many unique start positions we've found
            nm[key] = Object.keys(nm).length + 1;
          }
        }
      });
      window._nm = nm;
    }

    /* ══════════ REVEAL QUEUE — sorted by number ══════════ */
    function buildRevealQueue(pl) {
      const nm = window._nm;
      revealQueue = [...pl].map(pw => ({ ...pw, n: nm[`${pw.r},${pw.c}`] }))
        .sort((a, b) => a.n - b.n);
    }

    function entryKey(e) { return `${e.word}:${e.dir}:${e.r}:${e.c}`; }

    /* ══════════ GENERATE ══════════ */
    function generateCrossword() {
      if (words.length < 2) return;
      sndGen();
      revealedKeys = new Set(); revealIndex = 0;
      
      let bestResult = null;
      let maxPlaced = -1;
      let size = autoSize();
      
      // Try multiple attempts with different shuffles to find the most complete grid
      const attempts = 100;
      for (let i = 0; i < attempts; i++) {
        // Shuffling the order can lead to very different layouts
        const shuffled = [...words].sort(() => Math.random() - 0.5);
        const result = placeCrossword(shuffled.map(w => w.word), size);
        
        if (result.placed.length > maxPlaced) {
          maxPlaced = result.placed.length;
          bestResult = result;
          if (maxPlaced === words.length) break; // Stop early if we got everyone
        }
      }

      // If even after 100 tries we couldn't fit all words, try one last time with a bigger grid
      if (maxPlaced < words.length) {
        size += 4;
        for (let i = 0; i < 50; i++) {
          const shuffled = [...words].sort(() => Math.random() - 0.5);
          const result = placeCrossword(shuffled.map(w => w.word), size);
          if (result.placed.length > maxPlaced) {
            maxPlaced = result.placed.length;
            bestResult = result;
            if (maxPlaced === words.length) break;
          }
        }
      }

      placed = bestResult;
      window._grid = bestResult.grid; window._size = size;
      buildNumberMap(bestResult.placed, bestResult.grid);
      buildRevealQueue(bestResult.placed);
      renderGrid(bestResult.grid, size);
      renderClues(bestResult.placed);
      
      document.getElementById('cluesPanel').style.display = '';
      document.getElementById('revealAllBtn').style.display = '';
      document.getElementById('clearBtn').style.display = '';
      document.getElementById('revealControls').style.display = 'flex';
      updateRevealControls();
      animateCells();
      saveToLS();

      if (maxPlaced < words.length) {
        showMsg(`Placed ${maxPlaced} of ${words.length} words. Try again for a better layout!`, false);
      } else {
        showMsg(`All ${words.length} words placed perfectly!`, true);
      }
    }

    function clearAllWords() {
      if (!words.length || confirm('Clear all words and clues?')) {
        words = [];
        renderWordList();
        updateSizeBadge();
        resetGrid();
        saveToLS();
        showMsg('List cleared.', true);
      }
    }

    /* ══════════ RENDER GRID ══════════ */
    function renderGrid(g, size) {
      const wrap = document.getElementById('gridWrapper');
      wrap.innerHTML = '';
      const gridEl = document.createElement('div');
      gridEl.className = 'cw-grid';
      gridEl.style.gridTemplateColumns = `repeat(${size}, var(--cell))`;
      gridEl.style.gridTemplateRows = `repeat(${size}, var(--cell))`;
      window._gridEl = gridEl;

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cell = document.createElement('div');
          cell.className = g[r][c] !== null ? 'cw-cell light' : 'cw-cell black';
          cell.dataset.r = r; cell.dataset.c = c;
          if (g[r][c] !== null) {
            const n = window._nm[`${r},${c}`];
            if (n) { const s = document.createElement('span'); s.className = 'cell-num'; s.textContent = n; cell.appendChild(s); }
            cell.addEventListener('click', () => onCellClick(r, c));
          }
          gridEl.appendChild(cell);
        }
      }
      wrap.appendChild(gridEl);
    }

    function animateCells() {
      document.querySelectorAll('.cw-cell').forEach((c, i) => {
        c.style.opacity = '0'; c.style.transform = 'scale(0.8)';
        setTimeout(() => { c.style.transition = 'opacity 0.25s, transform 0.25s'; c.style.opacity = '1'; c.style.transform = 'scale(1)'; }, i * 7);
      });
    }

    /* ══════════ RENDER CLUES ══════════ */
    function renderClues(pl) {
      const nm = window._nm, across = [], down = [];
      pl.forEach(pw => {
        const n = nm[`${pw.r},${pw.c}`];
        // Find the original index to preserve input order
        const wIdx = words.findIndex(w => w.word === pw.word);
        const wobj = words[wIdx];
        const entry = { n, clue: wobj.clue, word: pw.word, r: pw.r, c: pw.c, dir: pw.dir, wIdx };
        if (pw.dir === 'across') across.push(entry); else down.push(entry);
      });
      // Sort clues by their original input order
      across.sort((a, b) => a.wIdx - b.wIdx);
      down.sort((a, b) => a.wIdx - b.wIdx);
      window._across = across; window._down = down;

      document.getElementById('acrossClues').innerHTML = across.map(x => `
    <div class="clue-row" id="cr-across-${x.n}" onclick="selectClue(${x.n},'across')">
      <span class="clue-n">${x.n}</span>
      <span class="clue-t">${x.clue}</span>
    </div>`).join('');
      document.getElementById('downClues').innerHTML = down.map(x => `
    <div class="clue-row" id="cr-down-${x.n}" onclick="selectClue(${x.n},'down')">
      <span class="clue-n">${x.n}</span>
      <span class="clue-t">${x.clue}</span>
    </div>`).join('');
    }

    /* ══════════ INTERACTIONS ══════════ */
    function selectClue(n, dir) {
      document.querySelectorAll('.clue-row').forEach(el => el.classList.remove('active-clue'));
      const el = document.getElementById(`cr-${dir}-${n}`);
      if (el) { el.classList.add('active-clue'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
      const list = dir === 'across' ? window._across : window._down;
      const clue = list.find(x => x.n === n);
      if (clue) highlightWord(clue.r, clue.c, clue.word.length, clue.dir);
      selectedClue = { n, dir };
    }

    function highlightWord(r, c, len, dir) {
      document.querySelectorAll('.cw-cell:not(.revealed-cell)').forEach(el => el.classList.remove('highlight'));
      for (let i = 0; i < len; i++) {
        const tr = dir === 'across' ? r : r + i, tc = dir === 'across' ? c + i : c;
        const cell = document.querySelector(`.cw-cell[data-r="${tr}"][data-c="${tc}"]`);
        if (cell && !cell.classList.contains('revealed-cell')) cell.classList.add('highlight');
      }
    }

    function onCellClick(r, c) {
      const g = window._grid; if (!g || g[r][c] === null) return;
      const ac = window._across && window._across.find(x => x.r === r && c >= x.c && c < x.c + x.word.length);
      const dc = window._down && window._down.find(x => x.c === c && r >= x.r && r < x.r + x.word.length);
      if (selectedClue) {
        if (selectedClue.dir === 'across' && dc) { selectClue(dc.n, 'down'); return; }
        if (selectedClue.dir === 'down' && ac) { selectClue(ac.n, 'across'); return; }
      }
      if (ac) selectClue(ac.n, 'across'); else if (dc) selectClue(dc.n, 'down');
    }

    /* ══════════ SEQUENTIAL REVEAL ══════════ */
    function updateRevealControls() {
      const btn = document.getElementById('revealNextBtn');
      const info = document.getElementById('nextClueInfo');
      const remaining = revealQueue.filter(e => !revealedKeys.has(entryKey(e)));
      if (remaining.length === 0) {
        info.innerHTML = '<span style="color:var(--success)">✓ All revealed!</span>';
        btn.disabled = true; btn.textContent = 'Done ✓';
        return;
      }
      const next = remaining[0];
      const dir = next.dir === 'across' ? '→' : '↓';
      info.innerHTML = `<span class="next-clue-num">${next.n}${dir}</span>${next.clue}`;
      btn.disabled = false; btn.textContent = 'Reveal next ↵';
    }

    function revealNext() {
      const remaining = revealQueue.filter(e => !revealedKeys.has(entryKey(e)));
      if (remaining.length === 0) return;
      const entry = remaining[0];
      applyRevealToCells(entry.word, entry.r, entry.c, entry.dir, true);
      revealedKeys.add(entryKey(entry));
      revealIndex++;
      selectClue(entry.n, entry.dir);
      updateRevealControls();
      updateClueDoneStates();
      saveToLS();
    }

    function revealAll() {
      revealQueue.forEach((entry, i) => {
        if (!revealedKeys.has(entryKey(entry))) {
          setTimeout(() => {
            applyRevealToCells(entry.word, entry.r, entry.c, entry.dir, true);
            revealedKeys.add(entryKey(entry));
            updateRevealControls();
            updateClueDoneStates();
            saveToLS();
          }, i * 130);
        }
      });
    }

    function applyRevealToCells(word, r, c, dir, animate) {
      for (let i = 0; i < word.length; i++) {
        const tr = dir === 'across' ? r : r + i, tc = dir === 'across' ? c + i : c;
        const cell = document.querySelector(`.cw-cell[data-r="${tr}"][data-c="${tc}"]`);
        if (!cell) continue;
        let ltr = cell.querySelector('.cell-letter');
        if (!ltr) { ltr = document.createElement('span'); ltr.className = 'cell-letter'; cell.appendChild(ltr); }
        ltr.textContent = word[i];
        cell.classList.remove('light', 'highlight', 'black');
        cell.classList.add('cw-cell', 'revealed-cell');
        if (!animate) cell.style.animation = 'none';
        const numEl = cell.querySelector('.cell-num');
        if (numEl) cell.appendChild(numEl); // keep number on top
      }
      if (animate) sndReveal();
    }

    function updateClueDoneStates() {
      revealedKeys.forEach(key => {
        const e = revealQueue.find(x => entryKey(x) === key);
        if (!e) return;
        const el = document.getElementById(`cr-${e.dir}-${e.n}`);
        if (el) el.classList.add('done-clue');
      });
    }

    function clearProgress() {
      revealedKeys = new Set(); revealIndex = 0;
      saveToLS();
      // Re-render grid to clear letters
      if (placed) { renderGrid(placed.grid, placed.grid.length); renderClues(placed.placed); }
      updateRevealControls(); updateClueDoneStates();
      showMsg('Progress reset!', true);
    }

    /* ══════════ KEYBOARD ══════════ */
    document.getElementById('wordInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('clueInput').focus(); });
    document.getElementById('clueInput').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.tagName !== 'INPUT' && placed) { revealNext(); }
    });
  </script>
</body>
